<body>

<nav class="navbar">

<header class="hero" style="background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1170&auto=format&fit=crop') center/cover no-repeat;">
  <div class="hero-content">
    <h1>Corporate Travel Solutions</h1>
    <p>Business Trips • Team Outings • Corporate Retreats</p>
  </div>
</header>

<section class="custom-form-wrapper">
  <h3>Register Your Company</h3>

  <!-- ❌ formsubmit हटाया -->
  <form class="custom-form">

    <label>Company Name*</label>
    <input type="text" name="company_name" required>

    <label>Company Email*</label>
    <input type="email" name="company_email" required>

    <label>Company Phone*</label>
    <input type="tel" name="company_phone" required>

    <label>Company Address*</label>
    <input type="text" name="company_address" required>

    <label>Company Type</label>
    <input type="text" name="company_type">

    <label>Manager Name*</label>
    <input type="text" name="manager_name" required>

    <label>Manager Email*</label>
    <input type="email" name="manager_email" required>

    <label>Manager Phone*</label>
    <input type="tel" name="manager_phone" required>

    <button type="submit">Submit</button>

  </form>
</section>

<footer>
  <div class="social-icons">
    <a href="https://www.instagram.com/thewanderventure/" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram" />

<!-- 🔥 FINAL FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain: "wander-venture.firebaseapp.com",
  projectId: "wander-venture",
  storageBucket: "wander-venture.firebasestorage.app",
  messagingSenderId: "834986747896",
  appId: "1:834986747896:web:2b13b0dce23a45c3b9d80d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.querySelector(".custom-form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    await addDoc(collection(db, "companies"), {
      company_name: form.company_name.value,
      company_email: form.company_email.value,
      company_phone: form.company_phone.value,
      company_address: form.company_address.value,
      company_type: form.company_type.value,
      manager_name: form.manager_name.value,
      manager_email: form.manager_email.value,
      manager_phone: form.manager_phone.value,
      status: "pending",
      createdAt: new Date()
    });

    alert("Company Registered Successfully!");
    form.reset();

  } catch (error) {
    alert("Error: " + error.message);
  }
});
</script>

</body>
</html>
