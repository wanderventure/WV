<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Wander Venture</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
}

/* NAV */
nav{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  color:#fff;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
}

/* LOGIN + PANEL */
.login-box, .admin-panel{
  max-width:1100px;
  margin:40px auto;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:15px;
}

/* HIDE */
.admin-panel{display:none;}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
}

/* STATS */
.stats{
  display:flex;
  gap:20px;
}

.stat-box{
  flex:1;
  background:linear-gradient(135deg,#16a34a,#065f46);
  color:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
}

button{
  padding:8px 12px;
  margin-top:10px;
  cursor:pointer;
}

.btn-green{background:green;color:#fff;}
.btn-red{background:red;color:#fff;}
</style>
</head>

<body>

<nav>
  <h2>Wander Venture</h2>
  <span>Admin Panel</span>
</nav>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input type="password" id="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="admin-panel" id="adminPanel">

<h2>Dashboard</h2>

<div class="stats">
  <div class="stat-box"><h3 id="total">0</h3>Total</div>
  <div class="stat-box"><h3 id="approved">0</h3>Approved</div>
  <div class="stat-box"><h3 id="pending">0</h3>Pending</div>
</div>

<div class="cards"></div>

</div>

<script>
function login(){
  if(document.getElementById("password").value==="700702001962"){
    loginBox.style.display="none";
    adminPanel.style.display="block";
  }
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain:"wander-venture.firebaseapp.com",
  projectId:"wander-venture"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".cards");

// FIXED ELEMENTS
const totalEl = document.getElementById("total");
const approvedEl = document.getElementById("approved");
const pendingEl = document.getElementById("pending");

// LIVE DATA
onSnapshot(collection(db,"companies"),(snapshot)=>{

  container.innerHTML="";

  let total=0,approved=0,pending=0;

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const status = data.status || "pending";

    total++;
    if(status==="approved") approved++; else pending++;

    container.innerHTML+=`
    <div class="card">
      <h3>${data.company_name}</h3>
      <p>${data.company_email}</p>
      <p>Status: ${status}</p>

      ${status==="pending" ? `
      <button class="btn-green" onclick="approve('${docSnap.id}')">Approve</button>
      <button class="btn-red" onclick="reject('${docSnap.id}')">Reject</button>
      ` : ""}
    </div>`;
  });

  totalEl.innerText=total;
  approvedEl.innerText=approved;
  pendingEl.innerText=pending;

});

// APPROVE
window.approve = async(id)=>{
  await updateDoc(doc(db,"companies",id),{status:"approved"});
};

// REJECT
window.reject = async(id)=>{
  await updateDoc(doc(db,"companies",id),{status:"rejected"});
};
</script>

</body>
</html>
