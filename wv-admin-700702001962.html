<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Wander Venture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      margin:0;
      color:#fff;
    }

    nav {
      background:#020617;
      padding:15px 25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav h2 { margin:0; }

    .login-box, .admin-panel {
      max-width:1100px;
      margin:40px auto;
      background:#fff;
      color:#000;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .admin-panel { display:none; }

    input {
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      padding:10px 16px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin:5px;
    }

    .btn-green { background:#22c55e; color:#fff; }
    .btn-red { background:#ef4444; color:#fff; }

    .stats {
      display:flex;
      gap:20px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .stat-box {
      flex:1;
      background:linear-gradient(135deg,#16a34a,#065f46);
      color:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .cards {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card {
      background:#f9fafb;
      padding:20px;
      border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<nav>
  <h2>Wander Venture</h2>
  <span>Admin Panel</span>
</nav>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter Access Code">
  <button class="btn-green" onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div class="admin-panel" id="adminPanel">

  <h2>Dashboard</h2>

  <div class="stats">
    <div class="stat-box">
      <h3 id="total">0</h3>
      <p>Total</p>
    </div>
    <div class="stat-box">
      <h3 id="approved">0</h3>
      <p>Approved</p>
    </div>
    <div class="stat-box">
      <h3 id="pending">0</h3>
      <p>Pending</p>
    </div>
  </div>

  <div class="cards"></div>

</div>

<script>
function login(){
  if(document.getElementById("password").value === "700702001962"){
    loginBox.style.display="none";
    adminPanel.style.display="block";
  } else {
    error.innerText="Wrong Code!";
  }
}
</script>

<!-- 🔥 FINAL SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import emailjs from "https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain: "wander-venture.firebaseapp.com",
  projectId: "wander-venture"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

emailjs.init("TCTkD_0rzOkTYshJk");

const container = document.querySelector(".cards");

function generateID(name){
  return "WV-" + name.replace(/\s+/g,'').slice(0,4).toUpperCase() + "-" + Math.floor(1000+Math.random()*9000);
}

// 🔥 LIVE DATA (main)
onSnapshot(collection(db,"companies"), (snapshot)=>{
  container.innerHTML="";

  let total=0, approved=0, pending=0;

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const status = data.status || "pending";

    total++;
    if(status==="approved") approved++; else pending++;

    container.innerHTML += `
      <div class="card">
        <h3>${data.company_name}</h3>
        <p>${data.company_email}</p>
        <p>Status: ${status}</p>

        ${status==="pending" ? `
          <button class="btn-green" onclick="approve('${docSnap.id}')">Approve</button>
          <button class="btn-red" onclick="reject('${docSnap.id}')">Reject</button>
        ` : ""}
      </div>
    `;
  });

  totalEl.innerText=total;
  approvedEl.innerText=approved;
  pendingEl.innerText=pending;
});

// ✅ FIXED APPROVE
window.approve = async (id)=>{
  const ref = doc(db,"companies",id);

  const snap = await getDoc(ref);
  if(!snap.exists()) return alert("Data not found");

  const data = snap.data();
  const companyID = generateID(data.company_name);

  await updateDoc(ref,{
    status:"approved",
    company_id:companyID
  });

  await emailjs.send("service_sap44im","template_zdjnl36",{
    to_email:data.company_email,
    company_name:data.company_name,
    company_id:companyID
  });

  alert("Approved + Email Sent 🚀");
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"companies",id),{status:"rejected"});
};
</script>

</body>
</html>
