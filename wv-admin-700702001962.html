<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Wander Venture</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
}
nav{
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
}
.login-box,.admin-panel{
  max-width:1100px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
}
.admin-panel{display:none;}
.stats{display:flex;gap:20px;}
.stat-box{
  flex:1;
  background:green;
  color:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}
.card{
  background:#f9f9f9;
  padding:20px;
  border-radius:10px;
}
button{padding:8px 12px;margin-top:10px;cursor:pointer;}
.btn-green{background:green;color:#fff;}
.btn-red{background:red;color:#fff;}
</style>
</head>

<body>

<nav>
  <h2>Wander Venture</h2>
  <span>Admin Panel</span>
</nav>

<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input type="password" id="password">
  <button onclick="login()">Login</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h2>Dashboard</h2>

  <div class="stats">
    <div class="stat-box"><h3 id="total">0</h3>Total</div>
    <div class="stat-box"><h3 id="approved">0</h3>Approved</div>
    <div class="stat-box"><h3 id="pending">0</h3>Pending</div>
  </div>

  <div class="cards"></div>
</div>

<script>
function login(){
  if(document.getElementById("password").value==="700702001962"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain:"wander-venture.firebaseapp.com",
  projectId:"wander-venture"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".cards");
const totalEl = document.getElementById("total");
const approvedEl = document.getElementById("approved");
const pendingEl = document.getElementById("pending");

// 🔥 LIVE DATA
onSnapshot(collection(db,"companies"),(snapshot)=>{
  container.innerHTML="";
  let total=0,approved=0,pending=0;

  snapshot.forEach(docSnap=>{
    const d = docSnap.data();
    const status = d.status || "pending";

    total++;
    if(status==="approved") approved++; else pending++;

    container.innerHTML+=`
    <div class="card">
      <h3>${d.company_name || "N/A"}</h3>

      <p><b>Email:</b> ${d.company_email || "N/A"}</p>
      <p><b>Phone:</b> ${d.company_phone || "N/A"}</p>
      <p><b>Address:</b> ${d.company_address || "N/A"}</p>
      <p><b>Type:</b> ${d.company_type || "N/A"}</p>

      <hr>

      <p><b>Manager:</b> ${d.manager_name || "N/A"}</p>
      <p><b>Manager Email:</b> ${d.manager_email || "N/A"}</p>
      <p><b>Manager Phone:</b> ${d.manager_phone || "N/A"}</p>

      <p><b>Status:</b> ${status}</p>

      ${status==="pending" ? `
        <button class="btn-green" onclick="approve('${docSnap.id}')">Approve</button>
        <button class="btn-red" onclick="reject('${docSnap.id}')">Reject</button>
      ` : ""}
    </div>`;
  });

  totalEl.innerText=total;
  approvedEl.innerText=approved;
  pendingEl.innerText=pending;
});

// 🔥 APPROVE + EMAIL (EmailJS REST API)
window.approve = async(id)=>{
  const ref = doc(db,"companies",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  await updateDoc(ref,{status:"approved"});

  fetch("https://api.emailjs.com/api/v1.0/email/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      service_id: "service_ywj2hnq",
      template_id: "template_zdjnl36",
      user_id: "TCTkD_0rzOkTYshJk",
      template_params: {
        company_name: data.company_name,
        company_id: id,
        email: data.company_email
      }
    })
  })
  .then(res=>{
    if(res.status===200){
      alert("Email Sent ✅");
    } else {
      alert("Email Failed ❌");
    }
  })
  .catch(err=>{
    console.log(err);
    alert("Error ❌");
  });
};

// ❌ REJECT
window.reject = async(id)=>{
  await updateDoc(doc(db,"companies",id),{status:"rejected"});
};
</script>

</body>
</html>
