<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wander Venture - Corporate</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}

/* HEADER */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  color:#fff;
  align-items:center;
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{height:28px}
.nav-links{display:flex;gap:20px}
.nav-links a{color:#fff;text-decoration:none}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  display:flex;justify-content:center;align-items:center;
}
.hero-box{
  background:rgba(0,0,0,0.6);
  padding:30px;border-radius:10px;color:#fff;text-align:center;
}
.hero-box input{padding:10px;width:250px}
.hero-box button{background:#ff7a18;color:#fff;padding:10px;border:none}

/* ABOUT */
.about{padding:40px;text-align:center;background:#fff}

/* DASHBOARD */
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}

/* MENU */
.menu{display:flex;gap:10px;margin-bottom:20px}
.menu button{
  background:#ff7a18;color:#fff;padding:8px 14px;border:none;border-radius:20px;cursor:pointer;
}

/* OFFERS */
.offers{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.offers img{width:100%;height:120px;object-fit:cover;border-radius:10px}

/* FORM */
input,select,textarea{
  width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;
}
.service-box{
  display:none;background:#f9f9f9;padding:10px;border-radius:8px
}

button.submit{background:#ff7a18;color:#fff;border:none;padding:10px}

/* FOOTER */
footer{background:#000;color:#fff;text-align:center;padding:15px}

.hidden{display:none}
</style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar">
  <div class="logo">
    <img src="images/logo.png">
    Wander Venture
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<!-- LOGIN -->
<div id="loginPage">
<section class="hero">
  <div class="hero-box">
    <h2>Corporate Login</h2>
    <input id="companyId" placeholder="Enter Company ID">
    <br><br>
    <button onclick="login()">Login</button>
  </div>
</section>

<div class="about">
  <h2>About Wander Venture</h2>
  <p>Hotels, Flights, Visa, Forex, Insurance & Corporate Travel Solutions</p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

<div class="container">

<div class="card" id="welcome"></div>

<div class="menu">
  <button onclick="show('main')">Dashboard</button>
  <button onclick="show('history')">History</button>
  <button onclick="show('files')">Files</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="card">
<h3>🔥 Latest Offers</h3>
<div class="offers">
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
  <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff">
</div>
</div>

<div class="card">
<h3>Customize Trip</h3>

<form action="https://formsubmit.co/info.wanderventure@gmail.com" method="POST" onsubmit="saveData()">

<input name="name" id="name" placeholder="Name *" required>
<input name="email" id="email" placeholder="Email *" required>
<input name="phone" id="phone" placeholder="Mobile *" required>

<select id="service" name="service" onchange="showService()">
<option value="">Select Service</option>
<option value="hotel">Hotel</option>
<option value="flight">Flight</option>
</select>

<!-- HOTEL -->
<div id="hotel" class="service-box">
<input type="date" id="checkin" name="checkin">
<input type="date" id="checkout" name="checkout">
<input name="rooms" placeholder="Rooms">
</div>

<!-- FLIGHT -->
<div id="flight" class="service-box">
<input type="date" id="flight_date" name="flight_date">
<select name="trip"><option>One Way</option><option>Round</option></select>
</div>

<textarea id="message" name="message" placeholder="Details..."></textarea>

<input type="hidden" name="_subject" value="New Corporate Query">
<input type="hidden" name="_captcha" value="false">

<button type="submit" class="submit">Submit</button>
</form>

</div>

</div>

<!-- HISTORY -->
<div id="history" class="hidden">
<h3>History</h3>
<div id="historyList"></div>
</div>

<!-- FILES -->
<div id="files" class="hidden">
<h3>Files</h3>
<p>No files yet</p>
</div>

</div>
</div>

<footer>© Wander Venture</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain:"wander-venture.firebaseapp.com",
  projectId:"wander-venture"
});

const db = getFirestore(app);
let cid="";

/* LOGIN */
window.login = async()=>{
  const id=document.getElementById("companyId").value;
  const snap=await getDoc(doc(db,"companies",id));

  if(!snap.exists()){alert("Invalid");return;}

  cid=id;
  loginPage.style.display="none";
  dashboardPage.classList.remove("hidden");

  welcome.innerHTML=`
  <h2>Welcome ${snap.data().company_name}</h2>
  <p>Company ID: ${cid}</p>`;

  loadHistory();
};

/* NAV */
window.show=(id)=>{
  document.getElementById("main").classList.add("hidden");
  document.getElementById("history").classList.add("hidden");
  document.getElementById("files").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
};

/* SERVICE */
window.showService=()=>{
  document.querySelectorAll(".service-box").forEach(x=>x.style.display="none");
  if(service.value) document.getElementById(service.value).style.display="block";
};

/* SAVE DATA (firebase) */
window.saveData=()=>{
  addDoc(collection(db,"queries"),{
    companyId: cid,
    service: service.value,
    checkin: checkin.value,
    checkout: checkout.value,
    flight_date: flight_date.value,
    message: message.value,
    date: new Date()
  });
};

/* HISTORY */
async function loadHistory(){
  const q=query(collection(db,"queries"),where("companyId","==",cid));
  const snap=await getDocs(q);

  historyList.innerHTML="";

  snap.forEach(doc=>{
    const d=doc.data();

    historyList.innerHTML+=`
    <div class="card">
      <b>${d.service}</b><br>
      ${d.checkin ? "Check-in: "+d.checkin+"<br>" : ""}
      ${d.checkout ? "Check-out: "+d.checkout+"<br>" : ""}
      ${d.flight_date ? "Flight: "+d.flight_date+"<br>" : ""}
      ${d.message}
    </div>`;
  });
}
</script>

</body>
</html>
