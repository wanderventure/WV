<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wander Venture - Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}

/* HEADER */
.navbar{
  display:flex;justify-content:space-between;
  padding:15px 25px;background:#000;color:#fff;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;background:#111;color:#fff;
  height:100vh;padding:20px;
}

.sidebar div{
  margin:15px 0;cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:20px}

/* CARDS */
.card{
  background:#fff;padding:20px;
  border-radius:10px;margin-bottom:20px;
}

/* FORM */
input,select,textarea{
  width:100%;padding:10px;margin:8px 0;
  border-radius:6px;border:1px solid #ccc;
}

button{
  background:#ff7a18;color:#fff;
  padding:10px;border:none;border-radius:6px;
}

/* HIDE */
.hidden{display:none}
</style>
</head>

<body>

<div class="navbar">
  <h3>Wander Venture</h3>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:50px auto;">
  <h3>Company Login</h3>
  <input id="companyId" placeholder="Enter Company ID">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div onclick="show('dashboard')">🏠 Dashboard</div>
  <div onclick="show('history')">📜 History</div>
  <div onclick="show('files')">📂 Files</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card" id="welcome"></div>

<!-- OFFERS -->
<div class="card">
  <h3>🔥 Latest Offers</h3>
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" width="100%">
  <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff" width="100%">
</div>

<!-- FORM -->
<div class="card">
<h3>Customize Trip</h3>

<form onsubmit="submitForm(event)">

<input id="name" placeholder="Name *" required>
<input id="email" type="email" placeholder="Email *" required>
<input id="phone" placeholder="Mobile *" required>

<select id="service">
  <option>Hotel</option>
  <option>Flight</option>
  <option>Forex</option>
  <option>Insurance</option>
  <option>Visa</option>
</select>

<textarea id="message" placeholder="Details..."></textarea>

<button type="submit">Submit</button>
</form>

</div>

</div>

<!-- HISTORY -->
<div id="history" class="hidden">
  <h3>History</h3>
  <div id="historyList"></div>
</div>

<!-- FILES -->
<div id="files" class="hidden">
  <h3>Files</h3>
  <p>No files yet</p>
</div>

</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkczeRthFs-O8r4PAB5hGfHd3fm_waqQI",
  authDomain:"wander-venture.firebaseapp.com",
  projectId:"wander-venture"
});

const db = getFirestore(app);
let companyId="";

/* LOGIN */
window.login = async()=>{
  const id=document.getElementById("companyId").value;
  const snap=await getDoc(doc(db,"companies",id));

  if(!snap.exists()){alert("Invalid");return;}

  companyId=id;

  loginBox.classList.add("hidden");
  appDiv.classList.remove("hidden");

  welcome.innerHTML=`<h2>Welcome ${snap.data().company_name}</h2>`;

  loadHistory();
};

const appDiv=document.getElementById("app");

/* NAV */
window.show=(id)=>{
  dashboard.classList.add("hidden");
  history.classList.add("hidden");
  files.classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
};

/* SUBMIT FORM */
window.submitForm = async(e)=>{
  e.preventDefault();

  await addDoc(collection(db,"queries"),{
    companyId,
    name:name.value,
    email:email.value,
    phone:phone.value,
    service:service.value,
    message:message.value,
    date:new Date()
  });

  alert("Submitted ✅");

  loadHistory();
};

/* LOAD HISTORY */
async function loadHistory(){
  const q=query(collection(db,"queries"),where("companyId","==",companyId));
  const snap=await getDocs(q);

  historyList.innerHTML="";

  snap.forEach(doc=>{
    const d=doc.data();

    historyList.innerHTML+=`
      <div class="card">
        <b>${d.service}</b><br>
        ${d.message}<br>
        <small>${new Date(d.date.seconds*1000).toLocaleString()}</small>
      </div>
    `;
  });
}
</script>

</body>
</html>
