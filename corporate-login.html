<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wander Venture - Corporate</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}
.navbar{display:flex;justify-content:space-between;padding:15px 25px;background:#000;color:#fff}
.nav-links{display:flex;gap:20px;list-style:none;margin:0;padding:0}
.nav-links a{color:#fff;text-decoration:none}

.hero{height:100vh;background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;display:flex;align-items:center;justify-content:center}
.hero-box{background:rgba(0,0,0,0.6);padding:25px;color:#fff;border-radius:10px}

.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;margin-bottom:20px;border-radius:10px}

.menu button{margin-right:10px;background:#ff7a18;color:#fff;border:none;padding:8px 12px}

.service-box{display:none;background:#f9f9f9;padding:10px;border-radius:8px;margin-top:10px}

input,select,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px}

.hidden{display:none}
</style>
</head>

<body>

<nav class="navbar">
<h3>Wander Venture</h3>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="index.html#about">About</a></li>
<li><a href="index.html#contact">Contact</a></li>
</ul>
</nav>

<!-- LOGIN -->
<div id="loginPage">
<div class="hero">
<div class="hero-box">
<h2>Login</h2>
<input id="companyId" placeholder="Enter Company ID">
<button onclick="login()">Login</button>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">
<div class="container">

<div class="card" id="welcome"></div>

<div class="menu">
<button onclick="show('main')">Dashboard</button>
<button onclick="show('history')">History</button>
</div>

<div id="main">

<div class="card">
<h3>Customize Trip</h3>

<form action="https://formsubmit.co/info.wanderventure@gmail.com" method="POST" onsubmit="saveData()">

<input name="name" id="name" placeholder="Name" required>
<input name="email" id="email" placeholder="Email" required>
<input name="phone" id="phone" placeholder="Phone" required>

<select id="service" name="service" onchange="showService()">
<option value="">Select Service</option>
<option value="hotel">Hotel</option>
<option value="flight">Flight</option>
<option value="forex">Forex</option>
<option value="insurance">Insurance</option>
<option value="visa">Visa</option>
<option value="sim">SIM</option>
</select>

<!-- HOTEL -->
<div id="hotel" class="service-box">
<label>Check-in</label>
<input type="date" id="checkin" name="checkin">

<label>Check-out</label>
<input type="date" id="checkout" name="checkout">

<input name="rooms" placeholder="Rooms">
</div>

<!-- FLIGHT -->
<div id="flight" class="service-box">
<label>Travel Date</label>
<input type="date" id="flight_date" name="flight_date">

<select name="trip"><option>One Way</option><option>Round Trip</option></select>
<select name="class"><option>Economy</option><option>Business</option></select>
</div>

<!-- FOREX -->
<div id="forex" class="service-box">
<input name="currency" placeholder="Currency">
<input name="amount" placeholder="Amount">
</div>

<!-- INSURANCE -->
<div id="insurance" class="service-box">
<input name="insurance_country" placeholder="Country">
<input name="insurance_days" placeholder="Days">
</div>

<!-- VISA -->
<div id="visa" class="service-box">
<input name="visa_country" placeholder="Country">
<input name="visa_type" placeholder="Tourist / Business">
</div>

<!-- SIM -->
<div id="sim" class="service-box">
<input name="sim_country" placeholder="Country">
<input name="sim_days" placeholder="Days">
</div>

<textarea id="message" name="message" placeholder="Details"></textarea>

<input type="hidden" name="_subject" value="New Query">
<input type="hidden" name="_captcha" value="false">

<button type="submit">Submit</button>
</form>

</div>
</div>

<!-- HISTORY -->
<div id="history" class="hidden">
<h3>History</h3>
<div id="historyList"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"wander-venture.firebaseapp.com",
projectId:"wander-venture"
});

const db = getFirestore(app);
let cid="";

/* LOGIN */
window.login = async()=>{
const id=document.getElementById("companyId").value;
const snap=await getDoc(doc(db,"companies",id));
if(!snap.exists()){alert("Invalid");return;}

cid=id;
loginPage.style.display="none";
dashboardPage.classList.remove("hidden");

welcome.innerHTML=`<h3>${snap.data().company_name}</h3>`;

loadHistory();
};

/* NAV */
window.show=(id)=>{
document.getElementById("main").classList.add("hidden");
document.getElementById("history").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
};

/* SERVICE */
window.showService=()=>{
document.querySelectorAll(".service-box").forEach(x=>x.style.display="none");
const val=service.value;
if(val) document.getElementById(val).style.display="block";
};

/* SAVE DATA */
window.saveData=()=>{
addDoc(collection(db,"queries"),{
companyId:cid,
service:service.value,
checkin:checkin.value,
checkout:checkout.value,
flight_date:flight_date.value,
message:message.value,
date:new Date()
});
};

/* HISTORY */
async function loadHistory(){
const q=query(collection(db,"queries"),where("companyId","==",cid));
const snap=await getDocs(q);

historyList.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();

historyList.innerHTML+=`
<div class="card">
<b>${d.service}</b><br>
${d.checkin?("Check-in: "+d.checkin+"<br>"):""}
${d.checkout?("Check-out: "+d.checkout+"<br>"):""}
${d.flight_date?("Flight: "+d.flight_date+"<br>"):""}
${d.message}
</div>`;
});
}
</script>

</body>
</html>
